<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Bautizo Baruk Carel</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400;1,600&family=Cinzel:wght@400;600&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Great+Vibes:wght@400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link rel="stylesheet" href="portada_baruk.css">
</head>
<body>
<div class="card" id="card">

  <!-- Fondo Imagen -->
  <img class="bg-layer" src="Img/Fondo.png" alt="Fondo">

  <!-- FLORALES SVG ESQUINAS — mismo arte que la imagen de referencia -->
  <!-- Top Left -->
  <svg class="floral floral-tl" viewBox="0 0 150 150" xmlns="http://www.w3.org/2000/svg">
    <g opacity=".8">
      <!-- hojas en rama principal -->
      <ellipse cx="48"  cy="90"  rx="12" ry="5" fill="#8aa8c8" opacity=".52" transform="rotate(-48 48 90)"/>
      <ellipse cx="68"  cy="65"  rx="11" ry="4.5" fill="#9ab8d0" opacity=".48" transform="rotate(-52 68 65)"/>
      <ellipse cx="88"  cy="44"  rx="10" ry="4" fill="#8aa8c8" opacity=".50" transform="rotate(-56 88 44)"/>
      <ellipse cx="30"  cy="115" rx="10" ry="4" fill="#a0b8d0" opacity=".45" transform="rotate(-40 30 115)"/>
      <!-- ROSA GRANDE -->
      <circle cx="32" cy="32" r="24" fill="#b8c9e0" opacity=".48"/>
      <circle cx="32" cy="32" r="18" fill="#c2d2ea" opacity=".50"/>
      <circle cx="32" cy="32" r="12" fill="#ccdcee" opacity=".55"/>
      <circle cx="32" cy="32" r="6"  fill="#d4e2f0" opacity=".60"/>
      <!-- pétalos alrededor rosa grande -->
      <ellipse cx="16" cy="22" rx="10" ry="6" fill="#aec3de" opacity=".5" transform="rotate(-28 16 22)"/>
      <ellipse cx="48" cy="22" rx="10" ry="6" fill="#aec3de" opacity=".5" transform="rotate(28 48 22)"/>
      <ellipse cx="16" cy="44" rx="10" ry="6" fill="#aec3de" opacity=".45" transform="rotate(28 16 44)"/>
      <ellipse cx="48" cy="44" rx="10" ry="6" fill="#aec3de" opacity=".45" transform="rotate(-28 48 44)"/>
      <!-- ROSA MEDIANA -->
      <circle cx="90" cy="20" r="14" fill="#b8c9e0" opacity=".42"/>
      <circle cx="90" cy="20" r="9"  fill="#c5d4e8" opacity=".48"/>
      <circle cx="90" cy="20" r="4"  fill="#d0dee8" opacity=".52"/>
      <!-- pétalos rosa mediana -->
      <ellipse cx="80" cy="13" rx="7" ry="4" fill="#aec3de" opacity=".45" transform="rotate(-20 80 13)"/>
      <ellipse cx="100" cy="13" rx="7" ry="4" fill="#aec3de" opacity=".45" transform="rotate(20 100 13)"/>
      <!-- florcitas pequeñas -->
      <circle cx="115" cy="48" r="6"  fill="#c2d2ea" opacity=".48"/>
      <circle cx="125" cy="35" r="4.5" fill="#d0dff0" opacity=".42"/>
      <circle cx="55"  cy="120" r="5" fill="#c0d0e8" opacity=".42"/>
      <circle cx="105" cy="75" r="4"  fill="#d0e0f0" opacity=".38"/>
      <!-- botones dorados -->
      <circle cx="32" cy="32" r="3"   fill="#d4af55" opacity=".72"/>
      <circle cx="90" cy="20" r="2.2" fill="#d4af55" opacity=".68"/>
      <circle cx="115" cy="48" r="1.8" fill="#d4af55" opacity=".60"/>
      <!-- ranitas/pequeñas flores extra -->
      <ellipse cx="20" cy="70" rx="7" ry="3" fill="#b8c9e0" opacity=".38" transform="rotate(-35 20 70)"/>
      <ellipse cx="105" cy="95" rx="6" ry="3" fill="#b8c9e0" opacity=".35" transform="rotate(-55 105 95)"/>
    </g>
  </svg>

  <!-- Top Right (espejo) -->
  <svg class="floral floral-tr" viewBox="0 0 150 150" xmlns="http://www.w3.org/2000/svg">
    <g opacity=".8">
      <ellipse cx="48"  cy="90"  rx="12" ry="5" fill="#8aa8c8" opacity=".52" transform="rotate(-48 48 90)"/>
      <ellipse cx="68"  cy="65"  rx="11" ry="4.5" fill="#9ab8d0" opacity=".48" transform="rotate(-52 68 65)"/>
      <ellipse cx="88"  cy="44"  rx="10" ry="4" fill="#8aa8c8" opacity=".50" transform="rotate(-56 88 44)"/>
      <ellipse cx="30"  cy="115" rx="10" ry="4" fill="#a0b8d0" opacity=".45" transform="rotate(-40 30 115)"/>
      <circle cx="32" cy="32" r="24" fill="#b8c9e0" opacity=".48"/>
      <circle cx="32" cy="32" r="18" fill="#c2d2ea" opacity=".50"/>
      <circle cx="32" cy="32" r="12" fill="#ccdcee" opacity=".55"/>
      <circle cx="32" cy="32" r="6"  fill="#d4e2f0" opacity=".60"/>
      <ellipse cx="16" cy="22" rx="10" ry="6" fill="#aec3de" opacity=".5" transform="rotate(-28 16 22)"/>
      <ellipse cx="48" cy="22" rx="10" ry="6" fill="#aec3de" opacity=".5" transform="rotate(28 48 22)"/>
      <ellipse cx="16" cy="44" rx="10" ry="6" fill="#aec3de" opacity=".45" transform="rotate(28 16 44)"/>
      <ellipse cx="48" cy="44" rx="10" ry="6" fill="#aec3de" opacity=".45" transform="rotate(-28 48 44)"/>
      <circle cx="90" cy="20" r="14" fill="#b8c9e0" opacity=".42"/>
      <circle cx="90" cy="20" r="9"  fill="#c5d4e8" opacity=".48"/>
      <circle cx="90" cy="20" r="4"  fill="#d0dee8" opacity=".52"/>
      <ellipse cx="80" cy="13" rx="7" ry="4" fill="#aec3de" opacity=".45" transform="rotate(-20 80 13)"/>
      <ellipse cx="100" cy="13" rx="7" ry="4" fill="#aec3de" opacity=".45" transform="rotate(20 100 13)"/>
      <circle cx="115" cy="48" r="6"  fill="#c2d2ea" opacity=".48"/>
      <circle cx="125" cy="35" r="4.5" fill="#d0dff0" opacity=".42"/>
      <circle cx="55"  cy="120" r="5" fill="#c0d0e8" opacity=".42"/>
      <circle cx="105" cy="75" r="4"  fill="#d0e0f0" opacity=".38"/>
      <circle cx="32" cy="32" r="3"   fill="#d4af55" opacity=".72"/>
      <circle cx="90" cy="20" r="2.2" fill="#d4af55" opacity=".68"/>
      <circle cx="115" cy="48" r="1.8" fill="#d4af55" opacity=".60"/>
    </g>
  </svg>

  <!-- Bottom Left -->
  <svg class="floral floral-bl" viewBox="0 0 150 150" xmlns="http://www.w3.org/2000/svg">
    <g opacity=".75">
      <ellipse cx="48" cy="60" rx="12" ry="5" fill="#8aa8c8" opacity=".50" transform="rotate(48 48 60)"/>
      <ellipse cx="78" cy="88" rx="11" ry="4.5" fill="#9ab8d0" opacity=".46" transform="rotate(52 78 88)"/>
      <circle cx="118" cy="118" r="22" fill="#b8c9e0" opacity=".46"/>
      <circle cx="118" cy="118" r="16" fill="#c2d2ea" opacity=".50"/>
      <circle cx="118" cy="118" r="10" fill="#ccdcee" opacity=".54"/>
      <circle cx="118" cy="118" r="4.5" fill="#d4e2f0" opacity=".60"/>
      <ellipse cx="100" cy="108" rx="10" ry="6" fill="#aec3de" opacity=".45" transform="rotate(-28 100 108)"/>
      <ellipse cx="136" cy="108" rx="10" ry="6" fill="#aec3de" opacity=".45" transform="rotate(28 136 108)"/>
      <circle cx="40"  cy="128" r="14" fill="#b8c9e0" opacity=".40"/>
      <circle cx="40"  cy="128" r="8"  fill="#c5d4e8" opacity=".45"/>
      <circle cx="40"  cy="128" r="3"  fill="#d4af55" opacity=".65"/>
      <circle cx="118" cy="118" r="2.8" fill="#d4af55" opacity=".70"/>
    </g>
  </svg>

  <!-- Bottom Right -->
  <svg class="floral floral-br" viewBox="0 0 150 150" xmlns="http://www.w3.org/2000/svg">
    <g opacity=".75">
      <ellipse cx="48" cy="60" rx="12" ry="5" fill="#8aa8c8" opacity=".50" transform="rotate(48 48 60)"/>
      <ellipse cx="78" cy="88" rx="11" ry="4.5" fill="#9ab8d0" opacity=".46" transform="rotate(52 78 88)"/>
      <circle cx="118" cy="118" r="22" fill="#b8c9e0" opacity=".46"/>
      <circle cx="118" cy="118" r="16" fill="#c2d2ea" opacity=".50"/>
      <circle cx="118" cy="118" r="10" fill="#ccdcee" opacity=".54"/>
      <circle cx="118" cy="118" r="4.5" fill="#d4e2f0" opacity=".60"/>
      <ellipse cx="100" cy="108" rx="10" ry="6" fill="#aec3de" opacity=".45" transform="rotate(-28 100 108)"/>
      <ellipse cx="136" cy="108" rx="10" ry="6" fill="#aec3de" opacity=".45" transform="rotate(28 136 108)"/>
      <circle cx="40"  cy="128" r="14" fill="#b8c9e0" opacity=".40"/>
      <circle cx="40"  cy="128" r="8"  fill="#c5d4e8" opacity=".45"/>
      <circle cx="40"  cy="128" r="3"  fill="#d4af55" opacity=".65"/>
      <circle cx="118" cy="118" r="2.8" fill="#d4af55" opacity=".70"/>
    </g>
  </svg>

  <!-- Marco dorado -->
  <div class="border-frame">
    <div class="corner c-tl"></div>
    <div class="corner c-tr"></div>
    <div class="corner c-bl"></div>
    <div class="corner c-br"></div>
  </div>

  <!-- Sparkles -->
  <i class="fa-solid fa-sparkles sp" style="font-size:9px;top:21%;left:7%;animation-delay:0s"></i>
  <i class="fa-solid fa-star      sp" style="font-size:7px;top:17%;right:8%;animation-delay:1.1s"></i>
  <i class="fa-solid fa-sparkles sp" style="font-size:8px;top:44%;left:4%;animation-delay:2.2s"></i>
  <i class="fa-solid fa-star      sp" style="font-size:6px;top:41%;right:5%;animation-delay:1.6s"></i>
  <i class="fa-solid fa-sparkles sp" style="font-size:9px;bottom:22%;left:9%;animation-delay:.8s"></i>
  <i class="fa-solid fa-star      sp" style="font-size:7px;bottom:20%;right:7%;animation-delay:2.8s"></i>

  <!-- ═══ FILA 1 — Ornamento superior ═══ -->
  <div class="row row-top">
    <div class="orn-line"></div>
    <i class="fa-solid fa-dove"  style="font-size:clamp(9px,2.5vw,13px);color:var(--gold);opacity:.82"></i>
    <div class="orn-dot"></div>
    <i class="fa-solid fa-cross" style="font-size:clamp(9px,2.3vw,12px);color:var(--gold)"></i>
    <div class="orn-dot"></div>
    <i class="fa-solid fa-dove"  style="font-size:clamp(9px,2.5vw,13px);color:var(--gold);opacity:.82;transform:scaleX(-1)"></i>
    <div class="orn-line r"></div>
  </div>

  <!-- ═══ FILA 2 — Cruz + subtítulo ═══ -->
  <div class="row row-header">
    <i class="fa-solid fa-cross cross-ico"></i>
    <div class="ev-sub">Bautizo y</div>
    <div class="sub-div">
      <div class="sub-line"></div>
      <i class="fa-solid fa-heart" style="font-size:clamp(6px,1.5vw,9px);color:var(--gold)"></i>
      <div class="sub-line"></div>
    </div>
    <div class="ev-sub">Corte de Cabello</div>
  </div>

  <!-- ═══ FILA 3 — Nombre ═══ -->
  <div class="row row-name">
    <div class="name-script">Baruk Carel</div>
    <div class="name-div">
      <div class="ndl"></div>
      <i class="fa-solid fa-heart" style="font-size:clamp(7px,1.8vw,10px);color:var(--gold)"></i>
      <div class="ndl r"></div>
    </div>
  </div>

  <!-- ═══ FILA 4 — Fecha ═══ -->
  <div class="row row-date">
    <div class="date-pill">
      <i class="fa-regular fa-calendar" style="font-size:clamp(8px,2.2vw,12px);color:var(--gold)"></i>
      <span class="date-txt">11</span>
      <div class="d-dot"></div>
      <span class="date-txt">Julio</span>
      <div class="d-dot"></div>
      <span class="date-txt">2026</span>
      <i class="fa-regular fa-calendar" style="font-size:clamp(8px,2.2vw,12px);color:var(--gold)"></i>
    </div>
  </div>

  <!-- ═══ FILA 5 — SOBRE (centro visual) ═══ -->
  <div class="row row-envelope">
    <div class="env-wrap" id="envWrap" onclick="openEnvelope()">

      <!-- Pon tu sobre.png en la misma carpeta -->
      <img class="env-img" src="Img/Carta.png" alt="Sobre"
           onerror="this.style.display='none';document.getElementById('envPh').style.display='flex'">

      <!-- Placeholder si no hay sobre.png -->
      <div class="env-ph" id="envPh">
        <i class="fa-regular fa-envelope-open env-ph-ico"></i>
      </div>
      <!-- Perlas decorativas -->
      <div class="pearl p1"></div>
      <div class="pearl p2"></div>
      <div class="pearl p3"></div>
    </div>
  </div>

  <!-- ═══ FILA 6 — CTA ═══ -->
  <div class="row row-cta">
    <div class="cta-sup">Toca el sobre para</div>
    <div class="cta-row">
      <i class="fa-solid fa-angles-down" style="font-size:clamp(8px,2vw,11px)"></i>
      <div class="cta-main">Abrir la Invitación</div>
      <i class="fa-solid fa-angles-down" style="font-size:clamp(8px,2vw,11px)"></i>
    </div>
  </div>

  <!-- ═══ FILA 7 — Ornamento inferior ═══ -->
  <div class="row row-bottom">
    <i class="fa-solid fa-leaf    bot-ico"></i>
    <div class="bot-dot"></div>
    <i class="fa-solid fa-circle  bot-ico" style="font-size:clamp(3px,1vw,5px)"></i>
    <div class="bot-dot"></div>
    <i class="fa-solid fa-heart   bot-ico"></i>
    <div class="bot-dot"></div>
    <i class="fa-solid fa-circle  bot-ico" style="font-size:clamp(3px,1vw,5px)"></i>
    <div class="bot-dot"></div>
    <i class="fa-solid fa-leaf    bot-ico" style="transform:scaleX(-1)"></i>
  </div>

</div><!-- /card -->

<script>
// Partículas flotantes
(function(){
  var card = document.getElementById('card');
  var pos = [{l:'14%',d:0},{l:'82%',d:2.1},{l:'46%',d:4.3},{l:'28%',d:1.4},{l:'68%',d:3.2},{l:'56%',d:5.5}];
  pos.forEach(function(p){
    var el = document.createElement('div');
    el.className = 'particle';
    el.style.cssText = 'width:2.5px;height:2.5px;left:'+p.l+';bottom:12%;animation-duration:'+(6+Math.random()*4)+'s;animation-delay:'+p.d+'s;';
    card.appendChild(el);
  });
})();

// Clic en el sobre
function openEnvelope(){
  var w = document.getElementById('envWrap');
  w.style.animation = 'none';
  w.style.transition = 'transform .18s ease';
  w.style.transform = 'scale(1.07) rotate(1deg)';
  setTimeout(function(){ w.style.transform = 'scale(.95)'; }, 180);
  setTimeout(function(){ w.style.transform = 'scale(1.04)'; }, 340);
  setTimeout(function(){
    w.style.transform = 'scale(1)';
    window.location.href = 'invitacion_baruk.html';
  }, 500);
}
</script>
</body>
</html>
